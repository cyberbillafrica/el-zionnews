<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staff Portal - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { width: 100%; max-width: 420px; padding: 2rem; box-shadow: 0 4px 12px rgba(0,0,0,.1); border-radius: 8px; background: #fff; }
  </style>
</head>
<body>

  <div class="auth-card">
    <h3 class="text-center mb-4">El Zion Staff Portal</h3>
    
    <ul class="nav nav-pills nav-justified mb-3" id="authTabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" id="password-tab" data-bs-toggle="pill" data-bs-target="#passwordAuth">Password</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="magic-tab" data-bs-toggle="pill" data-bs-target="#magicAuth">Magic Link</button>
      </li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="passwordAuth">
        <form id="passwordForm">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" id="loginEmail" class="form-control" required placeholder="name@elzion.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
      </div>

      <div class="tab-pane fade" id="magicAuth">
        <form id="magicForm">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" id="magicEmail" class="form-control" required placeholder="name@elzion.com">
          </div>
          <button type="submit" class="btn btn-success w-100">Send Magic Link</button>
          <div class="form-text mt-2 text-center text-muted">We will email you a secure, instant sign-in link.</div>
        </form>
      </div>
    </div>
    
    <div id="authAlert" class="alert mt-3" style="display: none;"></div>
  </div>

  <script type="module">
    import { signInWithPassword, signInWithMagicLink } from './services/auth.js';
    import { getUserRole } from './services/roles.js';
    import { getSession } from './services/supabase.js';

    const alertBox = document.getElementById('authAlert');

    function showAlert(msg, isSuccess = false) {
      alertBox.className = `alert mt-3 ${isSuccess ? 'alert-success' : 'alert-danger'}`;
      alertBox.textContent = msg;
      alertBox.style.display = 'block';
    }

    // Role Routing Engine
    async function routeUserByRole() {
      try {
        const role = await getUserRole();
        if (role === 'super_admin' || role === 'admin') {
          window.location.href = 'dashboard.html';
        } else if (role === 'editor' || role === 'author') {
          window.location.href = 'editor-console.html';
        } else {
          showAlert('Access Denied: Your profile role is unassigned.');
        }
      } catch (err) {
        showAlert('Routing error: ' + err.message);
      }
    }

    // Intercept active session on mount
    window.addEventListener('DOMContentLoaded', async () => {
      const { data } = await getSession();
      if (data?.session) {
        routeUserByRole();
      }
    });

    // Password Sign In Submit
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.style.display = 'none';
      try {
        await signInWithPassword(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value
        );
        await routeUserByRole();
      } catch (err) {
        showAlert(err.message);
      }
    });

    // Magic Link Submit
    document.getElementById('magicForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.style.display = 'none';
      try {
        await signInWithMagicLink(document.getElementById('magicEmail').value);
        showAlert('Check your email! A login link has been dispatched.', true);
      } catch (err) {
        showAlert(err.message);
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
