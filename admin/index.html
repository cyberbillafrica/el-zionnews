<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="card-title mb-4">Admin Login</h3>
            <form id="loginForm">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-control" required />
              </div>
              <div class="d-grid">
                <button class="btn btn-primary" type="submit">Sign in</button>
              </div>
            </form>
            <div id="error" class="mt-3 text-danger"></div>
          </div>
        </div>
        <p class="text-center text-muted mt-3 small">Use your Supabase credentials to sign in.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { signIn, getSession, supabase } from './supabase.js';

    async function checkRedirect() {
      try {
        const { data } = await getSession();
        if (data?.session) {
          // Check user role and redirect accordingly
          const { data: profile } = await supabase
            .from('profiles')
            .select('role')
            .eq('id', data.session.user.id)
            .single();

          if (profile?.role === 'admin' || profile?.role === 'super_admin') {
            window.location.href = 'dashboard.html';
          } else if (profile?.role === 'editor') {
            window.location.href = 'editor-console.html';
          }
        }
      } catch (err) {
        // User not found in profiles, let them login
      }
    }

    checkRedirect();

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        await signIn(email, password);
        
        // After login, check role and redirect
        const { data } = await getSession();
        if (data?.session) {
          const { data: profile } = await supabase
            .from('profiles')
            .select('role')
            .eq('id', data.session.user.id)
            .single();

          if (profile?.role === 'admin' || profile?.role === 'super_admin') {
            window.location.href = 'dashboard.html';
          } else if (profile?.role === 'editor') {
            window.location.href = 'editor-console.html';
          } else {
            throw new Error('User role not configured');
          }
        }
      } catch (err) {
        console.error(err);
        errorEl.textContent = err.message || 'Sign in failed';
      }
    });
  </script>
</body>
</html>
