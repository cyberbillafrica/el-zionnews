<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Staff Enrollment Portal - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #1a1d20; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="text-center mb-4">
      <h3 class="fw-bold text-dark mb-1">Staff Access Registry</h3>
      <p class="text-muted small">Input your designated dashboard credentials and validation token</p>
    </div>
    
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label small fw-bold">Secure Invitation Token</label>
        <input type="text" id="invitationCode" class="form-control text-center fw-bold text-danger border-2" placeholder="EZ-XXXXXX-XX" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Email Address</label>
        <input type="email" id="email" class="form-control" required placeholder="name@elzionnews.com">
      </div>
      <div class="mb-4">
  <label class="form-label small fw-bold">Create Password</label>
  <div class="input-group">
    <input type="password" id="password" class="form-control" required placeholder="••••••••">
    <button type="button" class="btn btn-outline-secondary" id="togglePassword">
      Show Password
    </button>
  </div>
</div>
      <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Complete Profile Activation</button>
    </form>
    <div class="text-center mt-3"><a href="index.html" class="small text-muted text-decoration-none">Already have a desk account? Login</a></div>
  </div>

  <script type="module">
    import { supabase } from './services/supabase.js';

   const togglePassword = document.querySelector('#togglePassword');
  const password = document.querySelector('#password');

  togglePassword.addEventListener('click', function () {
    // toggle the type attribute
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);

    // toggle the button text
    this.textContent = type === 'password' ? 'Show' : 'Hide';
  });
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const codeInput = document.getElementById('invitationCode').value.trim();
  const emailInput = document.getElementById('email').value.trim();
  const passwordInput = document.getElementById('password').value;

  // 1. Fetch using your exact schema criteria: "active" equals true
  const { data: invite, error: inviteError } = await supabase
    .from('invitation_codes')
    .select('*')
    .eq('code', codeInput)
    .eq('active', true)   // <-- FIXED: Changed from is_used to active
    .maybeSingle();       // Uses maybeSingle to handle errors gracefully if none found

  if (inviteError || !invite) {
    alert('Validation Error: This registration code is invalid, expired, or has been deactivated.');
    return;
  }

  // 2. Safely inspect usage limits and tracking counts against your schema columns
  if (invite.uses !== null && invite.max_uses !== null && invite.uses >= invite.max_uses) {
    alert('Validation Error: This registration code has hit its maximum allowed usage threshold.');
    return;
  }

  if (invite.expires_at && new Date(invite.expires_at) < new Date()) {
    alert('Validation Error: This registration code has expired.');
    return;
  }

  // 3. Register user credentials safely in Supabase Auth
  const { data: authData, error: authError } = await supabase.auth.signUp({
    email: emailInput,
    password: passwordInput,
    options: { data: { role: invite.role } }
  });

  if (authError) {
    alert('Authentication Error: ' + authError.message);
    return;
  }

  const newUser = authData.user;

  if (newUser) {
    // 4. Calculate the updated utilization tracking counter metrics
    const nextUsageCount = (invite.uses || 0) + 1;
    const shouldKeepActive = invite.max_uses ? (nextUsageCount < invite.max_uses) : false;
    
    // Update the validation token tracking row inside your schema
    await supabase
      .from('invitation_codes')
      .update({ 
        uses: nextUsageCount,
        active: shouldKeepActive 
      })
      .eq('id', invite.id);

    // 5. Create or sync your companion user profile layout mapping
    await supabase
      .from('profiles')
      .insert([{ id: newUser.id, email: emailInput, role: invite.role }]);

    alert('Profile enrollment successfully activated! Welcome to the team. Redirecting to login desk...');
    window.location.href = 'index.html';
  }
});
  </script>
</body>
</html>
