<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Staff Enrollment Portal - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"> <!-- Added for eye icons -->
  <style>
    body { background-color: #1a1d20; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="text-center mb-4">
      <h3 class="fw-bold text-dark mb-1">Staff Access Registry</h3>
      <p class="text-muted small">Input your credentials and validation token to create your staff profile</p>
    </div>
    
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label small fw-bold">Secure Invitation Token</label>
        <input type="text" id="invitationCode" class="form-control text-center fw-bold text-danger border-2" placeholder="EZ-XXXXXX-XX" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Full Name</label>
        <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Phone Number</label>
        <input type="tel" id="phone" class="form-control" placeholder="+234..." required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Email Address</label>
        <input type="email" id="email" class="form-control" required placeholder="name@elzionnews.com">
      </div>
      
      
      <!-- ✅ Fully‑featured password‑toggle field (Bootstrap 5 + FontAwesome 6) -->
<div class="mb-3 position-relative">
  <!-- Label with explicit `for` for better accessibility -->
  <label for="password" class="form-label small fw-bold">
    Create Security Password
  </label>

  <!-- Password input, includes ARIA descriptors for extra help/validation -->
  <input
    type="password"
    id="password"
    class="form-control"
    required
    placeholder="••••••••"
    aria-describedby="pwdTip pwdError"
  />

  <!-- Eye toggle button – semantically a button, not a link -->
  <button
    type="button"
    id="togglePassword"
    class="btn btn-sm btn-outline-secondary position-absolute end-0 top-50 translate-middle-y"
    aria-label="Show password"
    aria-controls="password"                <!-- tells screen‑readers which input it toggles -->
    aria-expanded="false"                   <!-- indicates current visibility state -->
    tabindex="0"
  >
    <!-- The icon will toggle between eye and eye‑slash -->
    <i class="fa-solid fa-eye"></i>
  </button>

  <!-- Optional tip text – visually hidden from visual users but read by screen readers -->
  <div id="pwdTip" class="form-text visually-hidden">
    Click the eye icon to reveal or hide the password.
  </div>

  <!-- Placeholder for validation error – toggled by JS -->
  <div id="pwdError" class="invalid-feedback visually-hidden">
    Please provide a password.
  </div>
</div>
      
      <!--<div class="mb-4 position-relative">
        <label class="form-label small fw-bold">Create Security Password</label>
        <input type="password" id="password" class="form-control" required placeholder="••••••••">
        <!-- Eye icon button --
        <button type="button" id="togglePassword" 
          class="btn btn-sm btn-outline-secondary position-absolute" 
          style="top: 50%; right: 10px; transform: translateY(-50%);">
          <i class="fa fa-eye"></i>
        </button>
      </div> -->

      <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Complete Profile Activation</button>
    </form>
    <div class="text-center mt-3"><a href="index.html" class="small text-muted text-decoration-none">Already have a desk account? Login</a></div>
  </div>

  <script type="module">
    import { supabase } from './services/supabase.js';

    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    // ✅ FIXED: toggle works correctly now
    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      // Toggle icon
      this.innerHTML = type === 'password' 
        ? '<i class="fa fa-eye"></i>' 
        : '<i class="fa fa-eye-slash"></i>';
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const codeInput = document.getElementById('invitationCode').value.trim();
      const fullNameInput = document.getElementById('fullName').value.trim();
      const phoneInput = document.getElementById('phone').value.trim();
      const emailInput = document.getElementById('email').value.trim();
      const passwordValue = passwordInput.value;

      // 1. Validate invitation code
      const { data: invite, error: inviteError } = await supabase
        .from('invitation_codes')
        .select('*')
        .eq('code', codeInput)
        .eq('active', true)
        .maybeSingle();

      if (inviteError || !invite) {
        alert('Validation Error: This registration code is invalid, expired, or has been deactivated.');
        return;
      }

      if (invite.uses !== null && invite.max_uses !== null && invite.uses >= invite.max_uses) {
        alert('Validation Error: This registration code has hit its maximum allowed usage threshold.');
        return;
      }

      // 2. Register user
      const { data: authData, error: authError } = await supabase.auth.signUp({
        email: emailInput,
        password: passwordValue,
        options: { 
          data: { 
            role: invite.role,
            full_name: fullNameInput,
            phone: phoneInput
          } 
        }
      });

      if (authError) {
        alert('Authentication Error: ' + authError.message);
        return;
      }

      const newUser = authData.user;

      if (newUser) {
        // 3. Update invitation usage
        const nextUsageCount = (invite.uses || 0) + 1;
        const shouldKeepActive = invite.max_uses ? (nextUsageCount < invite.max_uses) : false;
        
        await supabase
          .from('invitation_codes')
          .update({ 
            uses: nextUsageCount,
            active: shouldKeepActive 
          })
          .eq('id', invite.id);

        // 4. Insert profile
        const { error: profileError } = await supabase
          .from('profiles')
          .insert([{ 
            id: newUser.id, 
            email: emailInput, 
            role: invite.role,
            full_name: fullNameInput,
            phone: phoneInput
          }]);

        if (profileError) {
          console.error("Profile insertion tracking failure:", profileError);
        }

        alert('Registration complete! A verification link has been sent to your email. Please confirm it before logging in.');
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
