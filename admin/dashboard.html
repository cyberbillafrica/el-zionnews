<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,.05); background: #fff; }
    .nav-link { color: #333; border-radius: 4px; margin-bottom: 5px; }
    .nav-link.active { background-color: #0d6efd; color: #fff !important; }
    .section { display: none; }
    .section.active { display: block; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 sidebar p-3">
        <h5 class="py-2 border-bottom text-primary fw-bold">El Zion Admin</h5>
        <p class="small text-muted mb-3" id="userEmail">Loading...</p>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link active" href="#" data-section="dashboard">📊 Dashboard Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-section="articles">📝 All Articles</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-section="published">📢 Live Published</a>
          </li>
        </ul>
        <hr>
        <button id="logoutBtn" class="btn btn-sm btn-danger w-100">Exit System</button>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        
        <div id="dashboard" class="section active">
          <h2 class="mb-4">System Performance</h2>
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <div class="card bg-primary text-white p-3">
                <h5>Total Database Assets</h5>
                <h2 id="totalArticles">0</h2>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card bg-success text-white p-3">
                <h5>Live Public News</h5>
                <h2 id="publishedCount">0</h2>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card bg-warning text-dark p-3">
                <h5>Pending Review Queue</h5>
                <h2 id="pendingCount">0</h2>
              </div>
            </div>
          </div>
        </div>

        <div id="articles" class="section">
          <h2 class="mb-4">Master Article Repository</h2>
          <div id="articlesList" class="row"></div>
        </div>

        <div id="published" class="section">
          <h2 class="mb-4">Live News (Views Analytics)</h2>
          <div id="publishedList" class="row"></div>
        </div>

      </main>
    </div>
  </div>

  <div class="modal fade" id="articleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Review & Edit Article Alignment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-bold">Headline Title</label>
            <input type="text" id="editTitle" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Body Paragraphs</label>
            <textarea id="editBody" class="form-control" rows="8"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Editorial Review Status Update</label>
            <select id="editStatus" class="form-select">
              <option value="draft">Draft (Hidden)</option>
              <option value="pending_review">Pending Review (Staged)</option>
              <option value="published">Published (Live to Public)</option>
              <option value="archived">Archived (Removed)</option>
            </select>
          </div>
        </div>
        <div class="modal-footer d-flex justify-content-between">
          <button type="button" id="deleteArticleBtn" class="btn btn-danger">Purge Article Asset</button>
          <div>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="saveArticleBtn" class="btn btn-primary">Commit Changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getSession, signOut } from './services/auth.js';
    import { isAdmin } from './services/roles.js';
    import { getArticles, updateArticle, deleteArticle } from './services/articles.js';

    let currentUser = null;
    let editingArticleId = null;
    const articleModal = new bootstrap.Modal(document.getElementById('articleModal'));

    async function ensureAuth() {
      try {
        const { data } = await getSession();
        const session = data?.session;
        if (!session) { window.location.href = 'index.html'; return; }

        currentUser = session.user;
        document.getElementById('userEmail').textContent = session.user.email;

        const validAdmin = await isAdmin();
        if (!validAdmin) {
          alert('Access Denied: Administrative roles required.');
          window.location.href = 'index.html';
          return;
        }

        await loadDashboardStats();
        setupEventListeners();
      } catch (err) {
        window.location.href = 'index.html';
      }
    }

    async function loadDashboardStats() {
      try {
        const totalArticles = await getArticles();
        const published = totalArticles.filter(a => a.status === 'published');
        const pending = totalArticles.filter(a => a.status === 'pending_review');

        document.getElementById('totalArticles').textContent = totalArticles.length;
        document.getElementById('publishedCount').textContent = published.length;
        document.getElementById('pendingCount').textContent = pending.length;
      } catch (err) {
        console.error('Error fetching analytics matrix:', err);
      }
    }

    function setupEventListeners() {
      document.querySelectorAll('[data-section]').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          switchSection(link.dataset.section);
        });
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut();
        window.location.href = 'index.html';
      });

      document.getElementById('saveArticleBtn').addEventListener('click', saveArticleChanges);
      document.getElementById('deleteArticleBtn').addEventListener('click', handleArticleDelete);
    }

    window.switchSection = async function(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');

      document.querySelectorAll('[data-section]').forEach(link => {
        link.classList.remove('active');
        if (link.dataset.section === section) link.classList.add('active');
      });

      if (section === 'articles') {
        const data = await getArticles();
        renderArticlesList(data, 'articlesList');
      }
      if (section === 'published') {
        const data = await getArticles('published');
        renderArticlesList(data, 'publishedList', true);
      }
    };

    function renderArticlesList(articles, containerId, showViews = false) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      if (articles.length === 0) {
        container.innerHTML = '<p class="text-muted p-3">No records matching criteria found in table cluster.</p>';
        return;
      }

      articles.forEach(article => {
        const card = document.createElement('div');
        card.className = 'col-md-6 mb-3';
        card.innerHTML = `
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title fw-bold">${article.title}${article.breaking_news ? ' <span class="badge bg-danger">🔴 BREAKING</span>' : ''}</h5>
              <p class="card-text text-muted mb-1 small">Category: <strong>${article.categories?.name || 'Unassigned'}</strong></p>
              <p class="card-text text-muted mb-2 small">Workflow State: <span class="badge bg-secondary">${article.status}</span></p>
              ${showViews ? `<p class="card-text text-primary small mb-2">Metrics: <strong>${article.views || 0} clicks</strong></p>` : ''}
              <button class="btn btn-sm btn-outline-primary" onclick="editArticleModal('${article.id}')">Review Record</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.editArticleModal = async function(articleId) {
      editingArticleId = articleId;
      const all = await getArticles();
      const article = all.find(a => a.id === articleId);
      
      if (article) {
        import('./services/supabase.js').then(async ({ supabase }) => {
          const { data } = await supabase.from('articles').select('*').eq('id', articleId).single();
          document.getElementById('editTitle').value = data.title;
          document.getElementById('editBody').value = data.content || '';
          document.getElementById('editStatus').value = data.status;
          articleModal.show();
        });
      }
    };

    async function saveArticleChanges() {
      const updates = {
        title: document.getElementById('editTitle').value,
        content: document.getElementById('editBody').value,
        status: document.getElementById('editStatus').value,
        published_at: document.getElementById('editStatus').value === 'published' ? new Date().toISOString() : null
      };

      try {
        await updateArticle(editingArticleId, updates);
        alert('Article mutation compiled and written successfully.');
        articleModal.hide();
        await loadDashboardStats();
        switchSection('articles');
      } catch (err) {
        alert('Data engine save validation failure: ' + err.message);
      }
    }

    async function handleArticleDelete() {
      if (confirm('CRITICAL ACTION: Permanently wipe this record from database clusters? This cannot be undone.')) {
        try {
          await deleteArticle(editingArticleId);
          alert('Asset hard deleted.');
          articleModal.hide();
          await loadDashboardStats();
          switchSection('articles');
        } catch (err) {
          alert('Table constraint failure: ' + err.message);
        }
      }
    }

    ensureAuth();
  </script>
</body>
</html>
