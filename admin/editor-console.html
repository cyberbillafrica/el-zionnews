<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor Console - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; }
    .editor-sidebar { min-height: 100vh; background: #212529; color: #fff; p-3; }
    .editor-sidebar .nav-link { color: #ccc; }
    .editor-sidebar .nav-link.active { background: #0d6efd; color: #fff; }
    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 editor-sidebar p-3 d-flex flex-column justify-content-between">
        <div>
          <h5 class="fw-bold text-white border-bottom pb-2">Reporter Desk</h5>
          <p class="small text-muted mb-3" id="userEmail">Checking access...</p>
          <ul class="nav flex-column">
            <li class="nav-item mb-1">
              <a class="nav-link active" href="#" data-section="home" onclick="switchSection('home')">✍️ Compose News</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" data-section="drafts" onclick="switchSection('drafts')">📂 My Drafts (<span id="draftCount">0</span>)</a>
            </li>
          </ul>
        </div>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger w-100 mt-4">Sign Out</button>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        
        <div id="home" class="section active">
          <h2 class="mb-4">Create New Article Asset</h2>
          <form id="articleForm" class="card p-4">
            <div class="mb-3">
              <label class="form-label fw-bold">Article Title / Headline</label>
              <input type="text" id="title" class="form-control" required placeholder="Enter breaking news title...">
            </div>
            
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Classification Category</label>
                <select id="categorySelect" class="form-select" required>
                  <option value="">-- Fetching Available Categories --</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Featured Image (Supabase Storage Upload)</label>
                <input type="file" id="imageFile" class="form-control" accept="image/*">
                <div class="form-text">Direct high-speed asset upload to Supabase cloud bucket storage.</div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Short Excerpt / Preview Summary</label>
              <input type="text" id="excerpt" class="form-control" placeholder="Brief subtitle for index lists...">
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Content Narrative Body</label>
              <textarea id="body" class="form-control" rows="12" required placeholder="Write clear text content paragraphs here..."></textarea>
            </div>

            <div class="form-check form-switch mb-4">
              <input class="form-check-input" type="checkbox" id="breaking">
              <label class="form-check-label fw-bold text-danger" for="breaking">Mark as Critical Breaking News Banner Alert</label>
            </div>

            <div class="d-flex gap-2">
              <button type="button" class="btn btn-secondary px-4" onclick="saveDraft()">Save to Internal Drafts</button>
              <button type="button" class="btn btn-success px-4" onclick="publishArticle()">Submit to Admin Queue</button>
            </div>
          </form>
        </div>

        <div id="drafts" class="section">
          <h2 class="mb-4">Saved Content Staging Vault</h2>
          <div id="draftsList" class="row"></div>
        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { getSession, signOut } from './services/auth.js';
    import { isEditor } from './services/roles.js';
    import { createArticle, updateArticle, getArticles } from './services/articles.js';
    import { uploadMediaAsset } from './services/media.js';
    import { supabase } from './services/supabase.js';

    let currentUser = null;
    let editingArticleId = null;

    async function ensureAuth() {
      try {
        const { data } = await getSession();
        const session = data?.session;
        if (!session) { window.location.href = 'index.html'; return; }

        currentUser = session.user;
        document.getElementById('userEmail').textContent = session.user.email;

        const allowed = await isEditor();
        if (!allowed) {
          alert('Access violation: Access context unauthorized.');
          window.location.href = 'index.html';
          return;
        }

        await populateCategoriesDropdown();
        await loadStats();
      } catch (err) {
        window.location.href = 'index.html';
      }
    }

    async function populateCategoriesDropdown() {
      const dropdown = document.getElementById('categorySelect');
      dropdown.innerHTML = '<option value="">-- Select News Channel Category --</option>';
      
      const { data, error } = await supabase.from('categories').select('id, name');
      if (!error && data) {
        data.forEach(cat => {
          dropdown.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
        });
      }
    }

    async function loadStats() {
      const list = await getArticles();
      const drafts = list.filter(a => a.status === 'draft');
      document.getElementById('draftCount').textContent = drafts.length;
    }

    async function getFormData() {
      let imageUrl = null;
      const fileInput = document.getElementById('imageFile');
      
      // Automatic image pipeline upload verification
      if (fileInput.files.length > 0) {
        try {
          const file = fileInput.files[0];
          const mediaRecord = await uploadMediaAsset(file, currentUser.id);
          imageUrl = mediaRecord.file_url;
        } catch (uploadErr) {
          console.error("Image pipeline aborting:", uploadErr);
          alert("Warning: Asset upload failed. Saving with fallback layout.");
        }
      }

      const rawTitle = document.getElementById('title').value;
      const computedSlug = rawTitle.toLowerCase().trim().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');

      const data = {
        title: rawTitle,
        slug: computedSlug + '-' + Math.floor(1000 + Math.random() * 9000), // Append collision salt
        excerpt: document.getElementById('excerpt').value,
        content: document.getElementById('body').value,
        breaking_news: document.getElementById('breaking').checked,
        author_id: currentUser.id,
        category_id: document.getElementById('categorySelect').value || null
      };

      if (imageUrl) data.featured_image = imageUrl;
      return data;
    }

    window.saveDraft = async function() {
      if (!document.getElementById('title').value) { alert("A Title is mandatory to store a draft."); return; }
      const payload = await getFormData();
      payload.status = 'draft';

      try {
        if (editingArticleId) {
          await updateArticle(editingArticleId, payload);
        } else {
          await createArticle(payload);
        }
        alert('Staging state saved inside table cluster.');
        document.getElementById('articleForm').reset();
        editingArticleId = null;
        await loadStats();
        switchSection('home');
      } catch (err) {
        alert('Data layer error committing draft: ' + err.message);
      }
    };

    window.publishArticle = async function() {
      if (!document.getElementById('title').value || !document.getElementById('body').value) {
        alert("Headline and narrative content layers are missing context inputs.");
        return;
      }
      const payload = await getFormData();
      payload.status = 'pending_review'; // Enforces authorization pipeline check workflow

      try {
        if (editingArticleId) {
          await updateArticle(editingArticleId, payload);
        } else {
          await createArticle(payload);
        }
        alert('Dispatched to Administration review validation pipeline processing pools.');
        document.getElementById('articleForm').reset();
        editingArticleId = null;
        await loadStats();
        switchSection('home');
      } catch (err) {
        alert('Publish request validation exception: ' + err.message);
      }
    };

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut();
      window.location.href = 'index.html';
    });

    window.switchSection = function(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');
      
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
        if (link.dataset.section === section) link.classList.add('active');
      });

      if (section === 'drafts') {
        getArticles('draft').then(res => renderDrafts(res));
      }
    };

    function renderDrafts(articles) {
      const container = document.getElementById('draftsList');
      container.innerHTML = '';
      if (articles.length === 0) {
        container.innerHTML = '<p class="text-muted p-3">Your staging vault folder is currently empty.</p>';
        return;
      }
      articles.forEach(art => {
        const div = document.createElement('div');
        div.className = 'col-md-6 mb-3';
        div.innerHTML = `
          <div class="card p-3">
            <h5 class="fw-bold">${art.title}</h5>
            <p class="small text-muted mb-2">Created: ${new Date(art.created_at).toLocaleDateString()}</p>
            <button class="btn btn-sm btn-primary align-self-start" onclick="loadDraftForEditing('${art.id}')">Load Into Editor Workspaces</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    window.loadDraftForEditing = async function(id) {
      const { data } = await supabase.from('articles').select('*').eq('id', id).single();
      if(data) {
        editingArticleId = data.id;
        document.getElementById('title').value = data.title;
        document.getElementById('excerpt').value = data.excerpt || '';
        document.getElementById('body').value = data.content;
        document.getElementById('breaking').checked = data.breaking_news;
        document.getElementById('categorySelect').value = data.category_id || '';
        switchSection('home');
      }
    };

    ensureAuth();
  </script>
</body>
</html>
