<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reporter Suite - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --ez-red: #dc3545;
      --ez-gold: #d4af37;
      --ez-dark: #1f2327;
      --ez-light: #f8f9fa;
    }
    body { background-color: #f3f4f6; font-family: system-ui, sans-serif; }
    .console-header { background: #fff; border-bottom: 2px solid var(--ez-light); }
    .workspace-card { border: none; border-radius: 14px; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .nav-pill-custom { color: #555; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 8px; transition: all 0.2s; border: none; background: none; }
    .nav-pill-custom.active { background: var(--ez-dark); color: #fff; }
    .tab-view { display: none; }
    .tab-view.active { display: block; }
    .gold-dot { width: 8px; height: 8px; background-color: var(--ez-gold); border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>

  <!-- Console Top Header Bar -->
  <header class="console-header p-3 sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-2">
        <span class="gold-dot"></span>
        <h5 class="mb-0 fw-bold text-dark">Reporter Desk</h5>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="small text-muted d-none d-md-inline" id="userEmail">Validating Desk Identity...</span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-dark d-flex align-items-center gap-2 px-3" style="border-radius: 6px;">
          <span>Logout</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M6 12.5a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v2a.5.5 0 0 1-1 0v-2A1.5 1.5 0 0 1 6.5 2h8A1.5 1.5 0 0 1 17 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 5 12.5v-2a.5.5 0 0 1 1 0v2z"/>
            <path fill-rule="evenodd" d="M.146 8.354a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L1.707 7.5H10.5a.5.5 0 0 1 0 1H1.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Navigation Action Pills Center Bar -->
  <div class="container my-4 text-center">
    <div class="d-inline-flex bg-white p-1 rounded-3 shadow-sm border">
      <button class="nav-pill-custom active" data-tab="create"><i class="bi bi-pencil-square"></i> Compose Stories</button>
      <button class="nav-pill-custom" data-tab="vault"><i class="bi bi-archive-fill"></i> My Local Drafts (<span id="draftCount">0</span>)</button>
    </div>
  </div>

  <main class="container mb-5">
    
    <!-- PANE 1: WRITING ENVIRONMENT INTERFACE -->
    <div id="create" class="tab-view active">
      <div class="workspace-card card p-4">
        <h4 class="fw-bold text-dark mb-4 border-bottom pb-2">New Article Segment</h4>
        <form id="articleForm">
          <div class="mb-3">
            <label class="form-label small fw-bold">Headline Title</label>
            <input type="text" id="title" class="form-control form-control-lg border-2" required placeholder="Enter the news headline story title...">
          </div>
          <div class="row mb-3 g-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Assigned Feed Category</label>
              <select id="categorySelect" class="form-select" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Featured Cover Upload</label>
              <input type="file" id="imageFile" class="form-control" accept="image/*">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Short List Summary Description</label>
            <input type="text" id="excerpt" class="form-control" placeholder="Brief subtitle summary sentence for public listings...">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Story Body Narrative Text</label>
            <textarea id="body" class="form-control" rows="12" required placeholder="Begin drafting your news investigation narrative body here..."></textarea>
          </div>
          <div class="form-check form-switch p-3 bg-light rounded-3 mb-4 ms-0 d-flex align-items-center justify-content-between">
            <label class="form-check-label fw-bold text-danger mb-0" for="breaking"><i class="bi bi-lightning-charge-fill"></i> Set Flag As Breaking News Flash</label>
            <input class="form-check-input me-2" type="checkbox" id="breaking">
          </div>
          <div class="d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-secondary px-4 fw-semibold" onclick="saveDraft()">Save as Draft</button>
            <button type="button" class="btn btn-danger px-4 fw-semibold" style="background-color: var(--ez-red);" onclick="publishArticle()">Instant Live Publish</button>
          </div>
        </form>
      </div>
    </div>

    <!-- PANE 2: REPORTERS PRIVATE LOCAL DRAFTS VAULT -->
    <div id="vault" class="tab-view">
      <div class="workspace-card card p-4">
        <h4 class="fw-bold text-dark mb-4 border-bottom pb-2">Staged Saved Draft Worksheets</h4>
        <div id="draftsList" class="row g-3"></div>
      </div>
    </div>

  </main>

  <script type="module">
    import { getSession, signOut } from './services/auth.js';
    import { isEditor } from './services/roles.js';
    import { createArticle, updateArticle, getArticles } from './services/articles.js';
    import { uploadMediaAsset } from './services/media.js';
    import { supabase } from './services/supabase.js';

    let currentUser = null;
    let editingArticleId = null;

    async function ensureAuth() {
      try {
        const { data } = await getSession();
        if (!data?.session) { window.location.href = 'index.html'; return; }

        currentUser = data.session.user;
        document.getElementById('userEmail').textContent = currentUser.email;

        if (!(await isEditor())) {
          alert('System Context Error: Security level validation mapping verified invalid.');
          window.location.href = 'index.html';
          return;
        }

        await populateCategories();
        await loadStats();
        setupNavigationTabs();
      } catch (err) { window.location.href = 'index.html'; }
    }

    async function populateCategories() {
      const select = document.getElementById('categorySelect');
      select.innerHTML = '<option value="">-- Choose Segment --</option>';
      const { data } = await supabase.from('categories').select('id, name');
      if (data) data.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);
    }

    async function loadStats() {
      const list = await getArticles();
      document.getElementById('draftCount').textContent = list.filter(a => a.status === 'draft').length;
    }

    async function packageFormData() {
      let fileUrl = null;
      const fileNode = document.getElementById('imageFile');
      if (fileNode.files.length > 0) {
        const payload = await uploadMediaAsset(fileNode.files[0], currentUser.id);
        fileUrl = payload.file_url;
      }
      const titleText = document.getElementById('title').value;
      const data = {
        title: titleText,
        slug: titleText.toLowerCase().trim().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-') + '-' + Math.floor(1000 + Math.random() * 9000),
        excerpt: document.getElementById('excerpt').value,
        content: document.getElementById('body').value,
        breaking_news: document.getElementById('breaking').checked,
        author_id: currentUser.id,
        category_id: document.getElementById('categorySelect').value || null
      };
      if (fileUrl) data.featured_image = fileUrl;
      return data;
    }

    window.saveDraft = async function() {
      if (!document.getElementById('title').value) { alert('Headline required.'); return; }
      const payload = await packageFormData();
      payload.status = 'draft';

      if (editingArticleId) await updateArticle(editingArticleId, payload);
      else await createArticle(payload);

      alert('Draft saved successfully.');
      resetInterface();
    };

    window.publishArticle = async function() {
      if (!document.getElementById('title').value || !document.getElementById('body').value) { alert('Title and Content required.'); return; }
      const payload = await packageFormData();
      payload.status = 'published'; // Send direct to public feed instantly
      payload.published_at = new Date().toISOString();

      if (editingArticleId) await updateArticle(editingArticleId, payload);
      else await createArticle(payload);

      alert('Story has been published live!');
      resetInterface();
    };

    function resetInterface() {
      document.getElementById('articleForm').reset();
      editingArticleId = null;
      loadStats();
      switchTab('create');
    }

    function setupNavigationTabs() {
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut();
        window.location.href = 'index.html';
      });
    }

    async function switchTab(tabId) {
      document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('[data-tab]').forEach(b => {
        b.classList.remove('active');
        if (b.dataset.tab === tabId) b.classList.add('active');
      });

      if (tabId === 'vault') {
        const list = await getArticles('draft');
        const listEl = document.getElementById('draftsList');
        listEl.innerHTML = '';
        if (list.length === 0) { listEl.innerHTML = '<div class="text-muted p-2">No drafts found.</div>'; return; }
        
        list.forEach(item => {
          const card = document.createElement('div');
          card.className = 'col-md-6';
          card.innerHTML = `
            <div class="card p-3 bg-light border-0">
              <h6 class="fw-bold mb-2">${item.title}</h6>
              <button class="btn btn-sm btn-dark px-3 mt-2 rounded-2 align-self-start" onclick="loadDraft('${item.id}')">Edit Story</button>
            </div>
          `;
          listEl.appendChild(card);
        });
      }
    }

    window.loadDraft = async function(id) {
      const { data } = await supabase.from('articles').select('*').eq('id', id).single();
      if (data) {
        editingArticleId = data.id;
        document.getElementById('title').value = data.title;
        document.getElementById('excerpt').value = data.excerpt || '';
        document.getElementById('body').value = data.content;
        document.getElementById('breaking').checked = data.breaking_news;
        document.getElementById('categorySelect').value = data.category_id || '';
        switchTab('create');
      }
    };

    ensureAuth();
  </script>
</body>
</html>
