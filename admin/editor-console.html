<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reporter Suite - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --ez-red: #dc3545;
      --ez-gold: #d4af37;
      --ez-dark: #1f2327;
      --ez-light: #f8f9fa;
    }
    body { background-color: #f3f4f6; font-family: system-ui, sans-serif; }

    .console-header {
      background: linear-gradient(90deg, var(--ez-red), var(--ez-gold));
      color: #fff;
    }
    .console-header h5 { color: #fff; font-weight: 700; }

    .workspace-card {
      border: none; border-radius: 16px; background: #fff;
      box-shadow: 0 6px 24px rgba(0,0,0,0.05);
    }

    .nav-pill-custom {
      color: #555; font-weight: 600; padding: 0.6rem 1.2rem;
      border-radius: 8px; transition: all 0.2s; border: none; background: none;
    }
    .nav-pill-custom.active { background: var(--ez-dark); color: #fff; }
    .nav-pill-custom:hover { background: var(--ez-gold); color: #fff; }

    .tab-view { display: none; }
    .tab-view.active { display: block; }

    .gold-dot { width: 8px; height: 8px; background-color: var(--ez-gold); border-radius: 50%; display: inline-block; }

    .btn-ez-red { background: var(--ez-red); color: #fff; border-radius: 8px; font-weight: 600; }
    .btn-ez-red:hover { background: #b02a37; color: #fff; }

    @media (max-width: 576px) {
      .console-header h5 { font-size: 1rem; }
      #userEmail { display: none; }
      .d-inline-flex { flex-direction: column; width: 100%; }
      .nav-pill-custom { width: 100%; text-align: center; }
    }
    @media (max-width: 768px) {
      .form-control, .form-select { font-size: 1rem; padding: 0.75rem; }
      textarea { min-height: 200px; }
    }
  </style>
</head>
<body>

  <header class="console-header p-3 sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-2">
        <span class="gold-dot"></span>
        <h5 class="mb-0">Reporter Desk</h5>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="small text-light d-none d-md-inline" id="userEmail">Validating Desk Identity...</span>
        <button id="logoutBtn" class="btn btn-sm btn-ez-red d-flex align-items-center gap-2 px-3">
          <span>Logout</span>
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </header>

  <nav class="container my-4 text-center">
    <div class="d-inline-flex bg-white p-1 rounded-3 shadow-sm border" role="tablist">
      <button class="nav-pill-custom active" data-tab="create" role="tab" aria-selected="true">
        <i class="bi bi-pencil-square"></i> Compose Stories
      </button>
      <button class="nav-pill-custom" data-tab="vault" role="tab" aria-selected="false">
        <i class="bi bi-archive-fill"></i> My Drafts (<span id="draftCount">0</span>)
      </button>
    </div>
  </nav>

  <main class="container mb-5">

    <section id="create" class="tab-view active">
      <div class="workspace-card card p-4">
        <h4 class="mb-4 border-bottom pb-2">New Article Segment</h4>
        <form id="articleForm">
          <div class="mb-3">
            <label class="form-label small fw-bold">Headline</label>
            <input type="text" id="title" class="form-control form-control-lg" required placeholder="Story headline...">
          </div>
          <div class="row mb-3 g-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Category</label>
              <select id="categorySelect" class="form-select" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Featured Image</label>
              <input type="file" id="imageFile" class="form-control" accept="image/*">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Excerpt</label>
            <input type="text" id="excerpt" class="form-control" placeholder="Brief summary...">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Article Body</label>
            <textarea id="body" class="form-control" rows="10" required></textarea>
          </div>
          <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="breaking">
            <label class="form-check-label text-danger fw-bold" for="breaking">Breaking News</label>
          </div>
          <div class="d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-secondary px-4" onclick="saveDraft()">Save Draft</button>
            <button type="button" class="btn btn-ez-red px-4" onclick="publishArticle()">Publish Live</button>
          </div>
        </form>
      </div>
    </section>

    <section id="vault" class="tab-view">
      <div class="workspace-card card p-4">
        <h4 class="mb-4 border-bottom pb-2">Staged Saved Draft Worksheets</h4>
        <div id="draftsList" class="row g-3"></div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getSession, signOut } from './services/auth.js';
    import { isEditor } from './services/roles.js';
    import { createArticle, updateArticle, getArticles } from './services/articles.js';
    import { uploadMediaAsset } from './services/media.js';
    import { supabase } from './services/supabase.js';

    let currentUser = null;
    let editingArticleId = null;

    async function ensureAuth() {
      try {
        const { data } = await getSession();
        if (!data?.session) { window.location.href = 'index.html'; return; }

        currentUser = data.session.user;
        document.getElementById('userEmail').textContent = currentUser.email;

        if (!(await isEditor())) {
          // FIX Bug 2 + Bug 4: Sign out before redirecting so index.html
          // doesn't detect an active session and loop back here
          console.error('Editor auth failed: role check returned false for', currentUser.email);
          await supabase.auth.signOut();
          alert('Access Denied: Your account does not have editor or author access.');
          window.location.href = 'index.html';
          return;
        }

        await populateCategories();
        await loadStats();
        setupNavigationTabs();
      } catch (err) {
        // FIX Bug 4: Log the real error instead of silently swallowing it
        console.error('Editor console auth error:', err);
        // Sign out to break any loop caused by a corrupt/stale session
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      }
    }

    async function populateCategories() {
      const select = document.getElementById('categorySelect');
      select.innerHTML = '<option value="">-- Choose Segment --</option>';
      const { data } = await supabase.from('categories').select('id, name');
      if (data) data.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);
    }

    async function loadStats() {
      const list = await getArticles();
      document.getElementById('draftCount').textContent = list.filter(a => a.status === 'draft').length;
    }

    async function packageFormData() {
      let fileUrl = null;
      const fileNode = document.getElementById('imageFile');
      if (fileNode.files.length > 0) {
        const payload = await uploadMediaAsset(fileNode.files[0], currentUser.id);
        fileUrl = payload.file_url;
      }
      const titleText = document.getElementById('title').value;
      const data = {
        title: titleText,
        slug: titleText.toLowerCase().trim().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-') + '-' + Math.floor(1000 + Math.random() * 9000),
        excerpt: document.getElementById('excerpt').value,
        content: document.getElementById('body').value,
        breaking_news: document.getElementById('breaking').checked,
        author_id: currentUser.id,
        category_id: document.getElementById('categorySelect').value || null
      };
      if (fileUrl) data.featured_image = fileUrl;
      return data;
    }

    window.saveDraft = async function() {
      if (!document.getElementById('title').value) { alert('Headline required.'); return; }
      const payload = await packageFormData();
      payload.status = 'draft';

      if (editingArticleId) await updateArticle(editingArticleId, payload);
      else await createArticle(payload);

      alert('Draft saved successfully.');
      resetInterface();
    };

    window.publishArticle = async function() {
      if (!document.getElementById('title').value || !document.getElementById('body').value) {
        alert('Title and content are required.');
        return;
      }
      const payload = await packageFormData();
      payload.status = 'published';
      payload.published_at = new Date().toISOString();

      if (editingArticleId) await updateArticle(editingArticleId, payload);
      else await createArticle(payload);

      alert('Story has been published live!');
      resetInterface();
    };

    function resetInterface() {
      document.getElementById('articleForm').reset();
      editingArticleId = null;
      loadStats();
      switchTab('create');
    }

    function setupNavigationTabs() {
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut();
        window.location.href = 'index.html';
      });
    }

    async function switchTab(tabId) {
      document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('[data-tab]').forEach(b => {
        b.classList.remove('active');
        if (b.dataset.tab === tabId) b.classList.add('active');
      });

      if (tabId === 'vault') {
        const list = await getArticles('draft');
        const listEl = document.getElementById('draftsList');
        listEl.innerHTML = '';
        if (list.length === 0) { listEl.innerHTML = '<div class="text-muted p-2">No drafts found.</div>'; return; }

        list.forEach(item => {
          const card = document.createElement('div');
          card.className = 'col-md-6';
          card.innerHTML = `
            <div class="card p-3 bg-light border-0">
              <h6 class="fw-bold mb-2">${item.title}</h6>
              <button class="btn btn-sm btn-dark px-3 mt-2 rounded-2 align-self-start" onclick="loadDraft('${item.id}')">Edit Story</button>
            </div>
          `;
          listEl.appendChild(card);
        });
      }
    }

    window.loadDraft = async function(id) {
      const { data } = await supabase.from('articles').select('*').eq('id', id).single();
      if (data) {
        editingArticleId = data.id;
        document.getElementById('title').value = data.title;
        document.getElementById('excerpt').value = data.excerpt || '';
        document.getElementById('body').value = data.content;
        document.getElementById('breaking').checked = data.breaking_news;
        document.getElementById('categorySelect').value = data.category_id || '';
        switchTab('create');
      }
    };

    ensureAuth();
  </script>
</body>
</html>
