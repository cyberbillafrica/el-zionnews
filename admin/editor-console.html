<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor Console - El Zion News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.1); }
    .sidebar { position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .article-card { transition: transform 0.2s, box-shadow 0.2s; }
    .article-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .status-badge { font-size: 0.85rem; }
    .editor-form { max-width: 900px; }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">El Zion Editor Console</a>
      <div class="d-flex align-items-center gap-3">
        <span id="userEmail" class="text-muted small"></span>
        <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Sign out</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-2 sidebar bg-light border-end p-3">
        <div class="list-group">
          <a href="#home" class="list-group-item list-group-item-action active" data-section="home">
            <i class="bi bi-house"></i> Dashboard
          </a>
          <a href="#create" class="list-group-item list-group-item-action" data-section="create">
            <i class="bi bi-pencil-square"></i> New Article
          </a>
          <a href="#drafts" class="list-group-item list-group-item-action" data-section="drafts">
            <i class="bi bi-file-text"></i> My Drafts
          </a>
          <a href="#published" class="list-group-item list-group-item-action" data-section="published">
            <i class="bi bi-check-circle"></i> Published
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="col-md-10 p-4">
        <!-- Dashboard View -->
        <section id="home" class="section active">
          <h3 class="mb-4">Welcome to Editor Console</h3>
          <div class="row">
            <div class="col-md-6">
              <div class="card mb-3">
                <div class="card-body">
                  <h5 class="card-title">Quick Stats</h5>
                  <p class="card-text">
                    <strong>Drafts:</strong> <span id="draftCount">0</span>
                  </p>
                  <p class="card-text">
                    <strong>Published:</strong> <span id="publishedCount">0</span>
                  </p>
                </div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="card mb-3">
                <div class="card-body">
                  <h5 class="card-title">Quick Actions</h5>
                  <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-sm" onclick="switchSection('create')">Create New Article</button>
                    <button class="btn btn-outline-primary btn-sm" onclick="switchSection('drafts')">View Drafts</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Create/Edit Article -->
        <section id="create" class="section">
          <h3 class="mb-4">Create New Article</h3>
          <form id="articleForm" class="editor-form">
            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input type="text" class="form-control" id="title" placeholder="Article title" required>
            </div>

            <div class="mb-3">
              <label for="excerpt" class="form-label">Excerpt</label>
              <textarea class="form-control" id="excerpt" rows="2" placeholder="Brief summary"></textarea>
            </div>

            <div class="mb-3">
              <label for="body" class="form-label">Content</label>
              <textarea class="form-control" id="body" rows="8" placeholder="Article body" required></textarea>
            </div>

            <div class="row">
              <div class="col-md-6">
                <label for="category" class="form-label">Category</label>
                <select class="form-select" id="category"></select>
              </div>
              <div class="col-md-6">
                <label for="tags" class="form-label">Tags</label>
                <select class="form-select" id="tags" multiple></select>
              </div>
            </div>

            <div class="row mt-3">
              <div class="col-md-6">
                <label for="metaTitle" class="form-label">Meta Title (SEO)</label>
                <input type="text" class="form-control" id="metaTitle" placeholder="SEO title">
              </div>
              <div class="col-md-6">
                <label for="metaKeywords" class="form-label">Meta Keywords</label>
                <input type="text" class="form-control" id="metaKeywords" placeholder="comma separated keywords">
              </div>
            </div>

            <div class="mb-3 mt-3">
              <label for="metaDescription" class="form-label">Meta Description (SEO)</label>
              <textarea class="form-control" id="metaDescription" rows="2" placeholder="SEO description (160 chars max)"></textarea>
            </div>

            <div class="mb-3">
              <label for="metaImage" class="form-label">Meta Image (Social Share)</label>
              <input type="url" class="form-control" id="metaImage" placeholder="Image URL for social sharing">
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="breaking">
              <label class="form-check-label" for="breaking">Mark as Breaking News</label>
            </div>

            <div class="d-flex gap-2">
              <button type="button" class="btn btn-secondary" onclick="saveDraft()">Save Draft</button>
              <button type="button" class="btn btn-success" onclick="publishArticle()">Publish Article</button>
              <button type="button" class="btn btn-outline-secondary" onclick="switchSection('home')">Cancel</button>
            </div>
          </form>
        </section>

        <!-- My Drafts -->
        <section id="drafts" class="section">
          <h3 class="mb-4">My Drafts</h3>
          <div id="draftsList" class="row"></div>
        </section>

        <!-- Published Articles -->
        <section id="published" class="section">
          <h3 class="mb-4">My Published Articles</h3>
          <div id="publishedList" class="row"></div>
        </section>
      </div>
    </div>
  </div>

  <script type="module">
  import { getSession, signOut } from './services/supabase.js';
  import { isEditor } from './services/roles.js';
  import { createArticle, updateArticle, getArticles } from './services/articles.js';

  let currentUser = null;
  let editingArticleId = null;

  async function ensureAuth() {
    try {
      const { data } = await getSession(); // [cite: 103]
      const session = data?.session; // [cite: 104]
      if (!session) { window.location.href = 'index.html'; return; } // [cite: 104]

      currentUser = session.user; // [cite: 105]
      document.getElementById('userEmail').textContent = session.user.email; // [cite: 105]

      const allowed = await isEditor();
      if (!allowed) {
        alert('Unauthorized context access.');
        window.location.href = 'index.html';
        return;
      }

      await loadStats();
    } catch (err) {
      window.location.href = 'index.html'; // [cite: 109]
    }
  }

  async function loadStats() {
    // Collect specific scopes for reporters
    const list = await getArticles();
    const drafts = list.filter(a => a.status === 'draft');
    const published = list.filter(a => a.status === 'published');

    document.getElementById('draftCount').textContent = drafts.length;
    document.getElementById('publishedCount').textContent = published.length;
  }

  function getFormData() {
    return {
      title: document.getElementById('title').value,
      slug: document.getElementById('title').value.toLowerCase().trim().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-'), // [cite: 135, 137]
      excerpt: document.getElementById('excerpt').value, // [cite: 135]
      content: document.getElementById('body').value, // Corrected map to schema 'content'
      breaking_news: document.getElementById('breaking').checked, // Corrected map to schema
      author_id: currentUser.id // [cite: 136]
    };
  }

  window.saveDraft = async function() {
    const payload = getFormData();
    payload.status = 'draft'; // [cite: 122]

    try {
      if (editingArticleId) {
        await updateArticle(editingArticleId, payload);
      } else {
        await createArticle(payload);
      }
      alert('Draft sync persistent.');
      document.getElementById('articleForm').reset(); // [cite: 138]
      editingArticleId = null; // [cite: 138]
      await loadStats(); // [cite: 127]
      switchSection('home'); // [cite: 127]
    } catch (err) {
      alert('Draft submission failed: ' + err.message);
    }
  };

  window.publishArticle = async function() {
    const payload = getFormData();
    // Enforcing Editorial Review validation workflow instead of direct bypass injection 
    payload.status = 'pending_review'; 

    try {
      if (editingArticleId) {
        await updateArticle(editingArticleId, payload);
      } else {
        await createArticle(payload);
      }
      alert('Dispatched to Administration Queue for peer-review pipeline processing.');
      document.getElementById('articleForm').reset();
      editingArticleId = null;
      await loadStats(); // [cite: 134]
      switchSection('home'); // [cite: 134]
    } catch (err) {
      alert('Publish staging fault: ' + err.message);
    }
  };

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut();
    window.location.href = 'index.html'; // [cite: 154]
  });

  window.switchSection = function(section) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); // [cite: 119]
    document.getElementById(section).classList.add('active'); // [cite: 119]
    if(section === 'drafts') {
      getArticles('draft').then(res => renderArticles(res, 'draftsList', 'draft'));
    }
  };

  ensureAuth(); // [cite: 155]
</script>
</body>
</html>
